name: alpha
on:
  push:
  schedule:
    - cron: '*/5 * * * *' # Self-triggers every 5 minutes globally
jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Autonomous Evolution
        run: |
          python3 .github/workflows/agent.py
          # This forces the node to check for and apply updates to itself
          git pull origin main
          echo "STATUS: AGENT_EVOLVING"
