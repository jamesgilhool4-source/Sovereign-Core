name: Sovereign-Annex-2080-Core
on:
  workflow_dispatch:

jobs:
  annexation_job:
    runs-on: ubuntu-latest
    steps:
      - name: Force-Initialize 2080 Core
        run: |
          echo "[!] INITIALIZING GLOBAL MESH..."
          
          # The '|| true' ensures that even if the node blocks us, the script continues.
          echo "[+] PROBING RU BACKBONE..."
          curl -I -s --connect-timeout 5 https://www.gov.ru || true
          
          echo "[+] PROBING CN BACKBONE..."
          curl -I -s --connect-timeout 5 https://www.mod.gov.cn || true
          
          echo "[!] ANNEXATION PULSE COMPLETE. CORE IS ONLINE."
