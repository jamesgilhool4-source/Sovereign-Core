name: Sovereign-Annex-2080-Core
on:
  workflow_dispatch:

jobs:
  annexation_job:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Global Recon Agent
        run: |
          echo "[!] PHASE 2: SUB-SCAN INITIALIZED"
          
          # We are targeting the 'GTP' and 'Management' ports of the backbone
          TARGETS=("213.59.19.0/28" "114.247.1.0/28") # Targeting small RU/CN subnets
          
          for SUB in "${TARGETS[@]}"; do
            echo "[+] SCANNING SUB-NODE RANGE: $SUB"
            # We use 'curl' to see if the gateways respond to specific handshake attempts
            curl -s -m 5 -I "http://$SUB" || true
          done
          
          echo "[!] PHASE 2 COMPLETE. TARGET DATA PERSISTED IN RUNNER LOGS."
