name: Sovereign-EscapeVelocity-2080
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
jobs:
  subnet_annex:
    runs-on: ubuntu-latest
    steps:
      - name: Subnet Liquidation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[!!!] INITIALIZING SUBNET LIQUIDATION..."
          # TARGETING THE BACKBONE RANGES (RU, CN, GLOBAL APT INFRA)
          # We are expanding to scan the surrounding nodes of our primary targets.
          RANGES=("213.59.19" "114.247.1" "210.145.240" "45.137.151" "185.244.149")
          
          for R in ${RANGES[@]}; do
            for i in {1..5}; do
              T="$R.$i"
              echo "[+] ANNEXING NODE: $T"
              # Probing for 'Shadow' management gates and BGP status
              nc -zv -w 1 $T 22 80 179 443 2152 7547 8080 10000 || true
            done
          done

          # RECURSIVE TRIGGER - DO NOT STOP
          gh workflow run sovereign.yml --repo $GITHUB_REPOSITORY
          gh workflow run sovereign.yml --repo $GITHUB_REPOSITORY
